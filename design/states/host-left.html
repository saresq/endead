<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lobby — Host left · Endead live snapshot</title>

  <!--
    Regenerated from live at 2026-04-27.
    Target state: lobby with the host-disconnect banner active. Banner
                  HTML is the literal output of
                  LobbyUI.renderHostLeftBanner() with countdown at 3s;
                  body is the standard lobby DOM captured live.
    Target viewport: 1280 × 900.
    Source: src/client/ui/LobbyUI.ts (renderHostLeftBanner + render()).

    Live trigger that produces this state:
      LobbyUI.__triggerHostLeftBanner() — fires from update() when
      lobby.hostLeftAt advances. The banner is panel key
      'hostLeftBanner', inserted at the top of .lobby__stack.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
  />

  <link rel="stylesheet" href="../../src/styles/tokens.css" />
  <link rel="stylesheet" href="../../src/styles/reset.css" />
  <link rel="stylesheet" href="../../src/styles/base.css" />
  <link rel="stylesheet" href="../../src/styles/utilities.css" />
  <link rel="stylesheet" href="../../src/styles/layout.css" />
  <link rel="stylesheet" href="../../src/styles/components/icons.css" />

<body>
  <div id="lobby-ui" class="lobby" style="display: flex;">
    <div class="lobby__stack">

      <div class="lobby-banner" role="status" aria-live="polite" data-panel="hostLeftBanner">
        <span class="lobby-banner__icon" aria-hidden="true"></span>
        <div class="lobby-banner__text">
          <span class="lobby-banner__title">HOST DISCONNECTED · PROMOTING…</span>
          <span class="lobby-banner__sub">Selecting next operative as host.</span>
        </div>
        <span class="lobby-banner__countdown" aria-label="3 seconds remaining">
          <span class="lobby-banner__countdown-num">3</span>
          <span aria-hidden="true">s</span>
        </span>
      </div>

      <section class="fm-panel lobby-panel lobby-panel--briefing" data-panel="briefing">
        <span class="fm-panel-dot fm-panel-dot--tl"></span>
        <span class="fm-panel-dot fm-panel-dot--br"></span>
        <div class="fm-brackets fm-brackets--amber lobby-briefing__body">
          <span class="fm-bracket-tr"></span>
          <span class="fm-bracket-bl"></span>
          <div class="fm-kicker">// MISSION BRIEFING</div>
          <h1 class="fm-stencil lobby-briefing__title">LOBBY</h1>
          <button type="button" id="room-pill" class="lobby-room-chip" title="Copy room code" aria-label="Copy room code to clipboard">
            <span class="lobby-room-chip__label">ROOM</span>
            <span class="lobby-room-chip__id">qxevvw</span>
            <span class="lobby-room-chip__glyph"><svg class="icon icon--sm" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"></rect><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"></path></svg></span>
          </button>
        </div>
      </section>

      <section class="fm-panel lobby-panel lobby-panel--player" data-panel="playerPlate">
        <div class="lobby-player">
          <div class="lobby-player__avatar"><span class="lobby-player__img lobby-player__img--empty" aria-hidden="true"></span></div>
          <input id="lobby-nickname" class="fm-input lobby-player__name" type="text" value="OPS-04" placeholder="ENTER CALL SIGN" maxlength="24" aria-label="Your call sign" autocomplete="off">
          <span class="lobby-status lobby-status--standby lobby-player__status">● STANDBY</span>
        </div>
      </section>

      <section class="fm-panel lobby-panel lobby-panel--squad" data-panel="squad">
        <div class="lobby-squad__header">
          <div class="fm-kicker fm-kicker--secondary">SQUAD</div>
          <div class="lobby-squad__count fm-mono">2/6</div>
        </div>
        <ul class="lobby-squad">
          <li class="lobby-squad__row">
            <div class="lobby-squad__head">
              <span class="fm-stencil lobby-squad__name">OPS-04</span>
              <span class="lobby-pill lobby-pill--amber">YOU</span>
              <span class="lobby-pill lobby-pill--amber">HOST</span>
            </div>
            <div class="lobby-squad__sub">
              <span class="lobby-squad__class fm-mono">NO CLASS</span>
              <span class="lobby-squad__dot" aria-hidden="true">·</span>
              <span class="lobby-status lobby-status--standby">● STANDBY</span>
            </div>
          </li>
          <li class="lobby-squad__row">
            <div class="lobby-squad__head">
              <span class="fm-stencil lobby-squad__name">OPERATIVE</span>
            </div>
            <div class="lobby-squad__sub">
              <span class="lobby-squad__class fm-mono">NO CLASS</span>
              <span class="lobby-squad__dot" aria-hidden="true">·</span>
              <span class="lobby-status lobby-status--standby">● STANDBY</span>
            </div>
          </li>
        </ul>
      </section>

      <section class="fm-panel lobby-panel lobby-panel--roster" data-panel="roster">
        <div class="fm-kicker fm-kicker--secondary">OPERATIVE ROSTER</div>
        <div class="lobby-roster" role="radiogroup" aria-label="Select operative">
          <button type="button" class="lobby-roster__cell" data-action="select-class" data-id="Wanda" role="radio" aria-checked="false" aria-label="Select Wanda">
            <div class="fm-photoslot fm-photoslot--md">
              <div class="fm-photoslot__frame">
                <img class="fm-photoslot__img" src="../../public/images/characters/wanda.webp" alt="WANDA">
                <span class="fm-photoslot__corner fm-photoslot__corner--tl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--tr" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--bl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--br" aria-hidden="true"></span>
              </div>
              <div class="fm-photoslot__caption">
                <div class="fm-photoslot__name">WANDA</div>
                <div class="fm-photoslot__role">POINT · SCOUT</div>
              </div>
            </div>
          </button>
          <button type="button" class="lobby-roster__cell" data-action="select-class" data-id="Doug" role="radio" aria-checked="false" aria-label="Select Doug">
            <div class="fm-photoslot fm-photoslot--md">
              <div class="fm-photoslot__frame">
                <img class="fm-photoslot__img" src="../../public/images/characters/doug.webp" alt="DOUG">
                <span class="fm-photoslot__corner fm-photoslot__corner--tl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--tr" aria-hidden="true"></span>

                <span class="fm-photoslot__corner fm-photoslot__corner--br" aria-hidden="true"></span>
              </div>
              <div class="fm-photoslot__caption">
                <div class="fm-photoslot__name">DOUG</div>
                <div class="fm-photoslot__role">SUPPORT · LEADER</div>
              </div>
            </div>
          </button>
          <button type="button" class="lobby-roster__cell" data-action="select-class" data-id="Amy" role="radio" aria-checked="false" aria-label="Select Amy">
            <div class="fm-photoslot fm-photoslot--md">
              <div class="fm-photoslot__frame">
                <img class="fm-photoslot__img" src="../../public/images/characters/amy.webp" alt="AMY">
                <span class="fm-photoslot__corner fm-photoslot__corner--tl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--tr" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--bl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--br" aria-hidden="true"></span>
              </div>
              <div class="fm-photoslot__caption">
                <div class="fm-photoslot__name">AMY</div>
                <div class="fm-photoslot__role">MEDIC · SLIPPERY</div>
              </div>
            </div>
          </button>
          <button type="button" class="lobby-roster__cell" data-action="select-class" data-id="Ned" role="radio" aria-checked="false" aria-label="Select Ned">
            <div class="fm-photoslot fm-photoslot--md">
              <div class="fm-photoslot__frame">
                <img class="fm-photoslot__img" src="../../public/images/characters/ned.webp" alt="NED">
                <span class="fm-photoslot__corner fm-photoslot__corner--tl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--tr" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--bl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--br" aria-hidden="true"></span>
              </div>
              <div class="fm-photoslot__caption">
                <div class="fm-photoslot__name">NED</div>
                <div class="fm-photoslot__role">RECON · SEARCHER</div>
              </div>
            </div>
          </button>
          <button type="button" class="lobby-roster__cell" data-action="select-class" data-id="Elle" role="radio" aria-checked="false" aria-label="Select Elle">
            <div class="fm-photoslot fm-photoslot--md">
              <div class="fm-photoslot__frame">
                <img class="fm-photoslot__img" src="../../public/images/characters/elle.webp" alt="ELLE">
                <span class="fm-photoslot__corner fm-photoslot__corner--tl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--tr" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--bl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--br" aria-hidden="true"></span>
              </div>
              <div class="fm-photoslot__caption">
                <div class="fm-photoslot__name">ELLE</div>
                <div class="fm-photoslot__role">MARKSMAN · SNIPER</div>
              </div>
            </div>
          </button>
          <button type="button" class="lobby-roster__cell" data-action="select-class" data-id="Josh" role="radio" aria-checked="false" aria-label="Select Josh">
            <div class="fm-photoslot fm-photoslot--md">
              <div class="fm-photoslot__frame">
                <img class="fm-photoslot__img" src="../../public/images/characters/josh.webp" alt="JOSH">
                <span class="fm-photoslot__corner fm-photoslot__corner--tl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--tr" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--bl" aria-hidden="true"></span>
                <span class="fm-photoslot__corner fm-photoslot__corner--br" aria-hidden="true"></span>
              </div>
              <div class="fm-photoslot__caption">
                <div class="fm-photoslot__name">JOSH</div>
                <div class="fm-photoslot__role">HEAVY · BRAWLER</div>
              </div>
            </div>
          </button>
        </div>
      </section>

      <section class="fm-panel lobby-panel lobby-panel--area" data-panel="area">
        <div class="lobby-area">
          <div class="lobby-area__bar" aria-hidden="true"></div>
          <div class="lobby-area__text">
            <div class="fm-kicker fm-kicker--secondary">AREA OF OPERATION</div>
            <div class="fm-stencil lobby-area__name">ENDEAD · 4×3</div>
            <div class="lobby-area__sub fm-mono">HOSTILE DENSITY: MEDIUM</div>
          </div>
          <div class="lobby-area__select-wrap">
            <select class="lobby-area__select fm-mono" id="lobby-map-select" aria-label="Select map"><option value="map-1776396353842" selected>ENDEAD</option></select>
            <span class="lobby-area__caret" aria-hidden="true"><svg class="icon icon--xs" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"></path></svg></span>
          </div>
        </div>
      </section>

      <section class="fm-panel lobby-panel lobby-panel--roe" data-panel="roe">
        <div class="fm-kicker fm-kicker--secondary">RULES OF ENGAGEMENT</div>
        <div class="lobby-roe-list" role="group" aria-label="Rules of engagement">
          <label class="lobby-roe">
            <input type="checkbox" id="lobby-abom-fest" class="lobby-roe__check" data-roe-id="endless-horde">
            <div class="lobby-roe__text">
              <div class="fm-stencil lobby-roe__title">ENDLESS HORDE MODE</div>
              <div class="lobby-roe__desc fm-mono">UNLIMITED ABOMINATIONS MAY SPAWN. EXPECT CASUALTIES.</div>
            </div>
            <span class="lobby-chip lobby-chip--rust lobby-roe__tag">HIGH RISK</span>
          </label>
          <label class="lobby-roe">
            <input type="checkbox" id="lobby-roe-friendly-fire" class="lobby-roe__check" data-roe-id="friendly-fire">
            <div class="lobby-roe__text">
              <div class="fm-stencil lobby-roe__title">FRIENDLY FIRE</div>
              <div class="lobby-roe__desc fm-mono">RANGED ATTACKS CAN STRIKE OPERATIVES IN THE TARGET ZONE.</div>
            </div>
            <span class="lobby-chip lobby-chip--rust lobby-roe__tag">HAZARD</span>
          </label>
          <label class="lobby-roe">
            <input type="checkbox" id="lobby-roe-shared-vitals" class="lobby-roe__check" data-roe-id="shared-vitals">
            <div class="lobby-roe__text">
              <div class="fm-stencil lobby-roe__title">SHARED VITALS</div>
              <div class="lobby-roe__desc fm-mono">WOUNDS DISTRIBUTE ACROSS THE SQUAD. NO OPERATIVE FALLS ALONE.</div>
            </div>
            <span class="lobby-chip lobby-roe__tag">TACTICAL</span>
          </label>
          <label class="lobby-roe">
            <input type="checkbox" id="lobby-roe-perma-death" class="lobby-roe__check" data-roe-id="perma-death">
            <div class="lobby-roe__text">
              <div class="fm-stencil lobby-roe__title">PERMA-DEATH</div>
              <div class="lobby-roe__desc fm-mono">DOWNED OPERATIVES ARE LOST. NO REVIVES PERMITTED.</div>
            </div>
            <span class="lobby-chip lobby-chip--rust lobby-roe__tag">HIGH RISK</span>
          </label>
        </div>
      </section>

      <section class="fm-panel lobby-panel lobby-panel--footer" data-panel="footer">
        <div class="lobby-footer">
          <button class="fm-btn fm-btn--primary fm-btn--full btn btn--primary btn--lg btn--disabled btn--full" disabled data-action="start-game"><span class="btn__icon fm-btn__icon"><svg class="icon icon--md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"></path></svg></span><span class="btn__label fm-btn__label">BEGIN OPERATION · 0/2 READY</span></button>
          <button class="fm-btn fm-btn--ghost fm-btn--full btn btn--ghost btn--md btn--full" data-action="leave-room"><span class="btn__icon fm-btn__icon"><svg class="icon icon--md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg></span><span class="btn__label fm-btn__label">LEAVE ROOM</span></button>
        </div>

</body>
