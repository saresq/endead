<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menu — Room not found · Endead live snapshot</title>

  <!--
    Regenerated from live at 2026-04-27.
    Target state: main menu after attempting to JOIN a non-existent room
                  ID (`9X4Z-77LL`). Error state with rust-error input
                  border + "// ROOM NOT FOUND" kicker + alert banner.
    Target viewport: 1280 × 900.
    Source: src/client/ui/MenuUI.ts rendered by Vite dev server.
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
  />

  <link rel="stylesheet" href="../../src/styles/tokens.css" />
  <link rel="stylesheet" href="../../src/styles/reset.css" />
  <link rel="stylesheet" href="../../src/styles/base.css" />
  <link rel="stylesheet" href="../../src/styles/utilities.css" />
  <link rel="stylesheet" href="../../src/styles/layout.css" />
  <link rel="stylesheet" href="../../src/styles/components/icons.css" />
  <link rel="stylesheet" href="../../src/styles/components/buttons.css" />
  <link rel="stylesheet" href="../../src/styles/components/forms.css" />
  <link rel="stylesheet" href="../../src/styles/components/menu.css" />
  <link rel="stylesheet" href="../../src/styles/components/field-manual.css" />
</head>
<body>
  <div id="menu-ui">
    <div class="menu-field" aria-hidden="true">
      <div class="menu-field__grid"></div>
      <div class="menu-field__vignette"></div>
    </div>

    <div class="menu-stack">
      <section class="menu-card menu-card--id fm-panel" role="dialog" aria-labelledby="menu-wordmark">
        <span class="fm-panel-dot fm-panel-dot--tl" aria-hidden="true"></span>
        <span class="fm-panel-dot fm-panel-dot--br" aria-hidden="true"></span>

        <div class="fm-hazard-tape menu-card__stripe menu-card__stripe--top" aria-hidden="true"></div>

        <header class="menu-header">
          <div class="menu-header__kicker fm-kicker">// ROOM NOT FOUND</div>

          <div class="menu-wordmark fm-brackets fm-brackets--amber fm-brackets--lg">
            <span class="fm-bracket-tr" aria-hidden="true"></span>
            <span class="fm-bracket-bl" aria-hidden="true"></span>
            <h1 id="menu-wordmark" class="menu-wordmark__text fm-stencil">Endead</h1>
          </div>

          <div class="menu-header__subline fm-mono">// FIELD MANUAL · TACTICAL SURVIVAL</div>
        </header>

        <div class="menu-message" role="alert">
          <span class="menu-message__marker" aria-hidden="true">!</span>
          <span class="menu-message__text">Room 9X4Z-77LL could not be located. Confirm the code with your host and try again.</span>
        </div>

        <div class="menu-form">
          <div class="menu-field-group">
            <label class="fm-input__label fm-kicker" for="menu-nickname">CALL SIGN</label>
            <input id="menu-nickname" class="fm-input menu-input" type="text" maxlength="24" value="Hunter" placeholder="designate operator" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="menu-card__divider" aria-hidden="true"></div>
      </section>

      <div class="menu-action menu-action--standalone">
        <button class="fm-btn fm-btn--primary fm-btn--full btn btn--primary btn--lg btn--full" data-action="create-room"><span class="btn__icon fm-btn__icon"><svg class="icon icon--md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"></path></svg></span><span class="btn__label fm-btn__label">Create Room</span></button>
      </div>

      <div class="menu-divider menu-divider--standalone" role="separator" aria-label="or join by room id">
        <span class="menu-divider__line" aria-hidden="true"></span>
        <span class="menu-divider__label fm-kicker">// OR JOIN BY ROOM ID</span>
        <span class="menu-divider__line" aria-hidden="true"></span>
      </div>

      <section class="menu-card menu-card--join fm-panel" aria-label="Join existing room">
        <span class="fm-panel-dot fm-panel-dot--tl" aria-hidden="true"></span>
        <span class="fm-panel-dot fm-panel-dot--br" aria-hidden="true"></span>

        <div class="menu-form">
          <div class="menu-field-group">
            <label class="fm-input__label fm-kicker" for="menu-room-id">ROOM ID</label>
            <div class="menu-join-row">
              <input id="menu-room-id" class="fm-input menu-input fm-input--error" type="text" value="9X4Z-77LL" placeholder="XXXX-XXXX" autocomplete="off" spellcheck="false" aria-invalid="true">
              <button class="fm-btn fm-btn--secondary btn btn--secondary btn--md" data-action="join-room"><span class="btn__label fm-btn__label">Join</span></button>
            </div>
          </div>

          <button class="fm-btn fm-btn--ghost fm-btn--full btn btn--ghost btn--md btn--full" data-action="go-back"><span class="btn__icon fm-btn__icon"><svg class="icon icon--md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg></span><span class="btn__label fm-btn__label">Go Back</span></button>
        </div>

        <div class="menu-card__divider" aria-hidden="true"></div>
      </section>
    </div>
  </div>
</body>
</html>
