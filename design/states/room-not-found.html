<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Room not found state · Endead design reference</title>

  <!--
    DESIGN ONLY — reference frame for follow-up #06.
    Lives in /design/states/. Static; not wired into MenuUI.
    Live target: src/client/ui/MenuUI.ts (Wave 4).
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Display:wght@400;700;900&family=Oswald:wght@400;500;700&family=Barlow+Condensed:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
  />

  <link rel="stylesheet" href="../../src/styles/tokens.css" />
  <link rel="stylesheet" href="../../src/styles/reset.css" />
  <link rel="stylesheet" href="../../src/styles/base.css" />
  <link rel="stylesheet" href="../../src/styles/utilities.css" />
  <link rel="stylesheet" href="../../src/styles/components/buttons.css" />
  <link rel="stylesheet" href="../../src/styles/components/forms.css" />
  <link rel="stylesheet" href="../../src/styles/components/field-manual.css" />
  <link rel="stylesheet" href="../../src/styles/components/menu.css" />

  <style>
    /* Mockup-only chrome. Frame wrapper + the rust-error variants for the
       room-id input + JOIN shake. All colors come from canonical tokens. */
    body { background: var(--bg-0); }

    .frame {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }

    /* Render at parity with the live #menu-ui surface */
    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(240, 169, 74, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(240, 169, 74, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 95%);
    }

    /* Error variant — input border + caret turn rust. The :left-border
       amber accent is preserved as the system motif; the perimeter goes
       rust to communicate the failure without doubling the error state. */
    .fm-input--error {
      border-color: var(--rust-400);
      border-left-color: var(--rust-500);
      caret-color: var(--rust-300);
      color: var(--bone-100);
    }
    .fm-input--error:focus {
      border-color: var(--rust-300);
      border-left-color: var(--rust-400);
      box-shadow:
        inset 0 1px 0 rgba(0, 0, 0, 0.35),
        0 0 0 2px rgba(196, 90, 44, 0.28);
    }

    /* Submit-failure shake — fires once on attempted JOIN with a bad code.
       Compositor-friendly: transform only. */
    .fm-btn--shake { animation: btn-shake 380ms cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes btn-shake {
      0%, 100% { transform: translateX(0); }
      15%      { transform: translateX(-4px); }
      30%      { transform: translateX(4px); }
      45%      { transform: translateX(-3px); }
      60%      { transform: translateX(3px); }
      80%      { transform: translateX(-1px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .fm-btn--shake { animation: none; }
    }

    .frame-caption {
      position: fixed;
      left: 12px;
      bottom: 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bone-500);
      background: rgba(11, 13, 10, 0.85);
      padding: 6px 10px;
      border-left: 2px solid var(--amber-400);
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="menu-stack">
      <section class="menu-card menu-card--id fm-panel" role="dialog" aria-labelledby="menu-wordmark">
        <span class="fm-panel-dot fm-panel-dot--tl" aria-hidden="true"></span>
        <span class="fm-panel-dot fm-panel-dot--br" aria-hidden="true"></span>

        <div class="fm-hazard-tape menu-card__stripe menu-card__stripe--top" aria-hidden="true"></div>

        <header class="menu-header">
          <div class="menu-header__kicker fm-kicker">// ROOM NOT FOUND</div>
          <div class="menu-wordmark fm-brackets fm-brackets--rust fm-brackets--lg">
            <span class="fm-bracket-tr" aria-hidden="true"></span>
            <span class="fm-bracket-bl" aria-hidden="true"></span>
            <h1 id="menu-wordmark" class="menu-wordmark__text fm-stencil">Endead</h1>
          </div>
          <div class="menu-header__subline fm-mono">// FIELD MANUAL &middot; TACTICAL SURVIVAL</div>
        </header>

        <!-- Persistent inline error strip — same .menu-message rust strip
             the live UI already ships -->
        <div class="menu-message" role="alert">
          <span class="menu-message__marker" aria-hidden="true">!</span>
          <span class="menu-message__text">
            Room <strong>9X4Z-77LL</strong> could not be located. Confirm the code with your host and try again.
          </span>
        </div>

        <div class="menu-form">
          <div class="menu-field-group">
            <label class="fm-input__label fm-kicker" for="menu-nickname">CALL SIGN</label>
            <input
              id="menu-nickname"
              class="fm-input menu-input"
              type="text"
              maxlength="24"
              value="OPS-04"
              placeholder="designate operator"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>

        <div class="menu-card__divider" aria-hidden="true"></div>
      </section>

      <div class="menu-divider menu-divider--standalone" role="separator" aria-label="join by room id">
        <span class="menu-divider__line" aria-hidden="true"></span>
        <span class="menu-divider__label fm-kicker">// JOIN BY ROOM ID</span>
        <span class="menu-divider__line" aria-hidden="true"></span>
      </div>

      <section class="menu-card menu-card--join fm-panel" aria-label="Join existing room">
        <span class="fm-panel-dot fm-panel-dot--tl" aria-hidden="true"></span>
        <span class="fm-panel-dot fm-panel-dot--br" aria-hidden="true"></span>

        <div class="menu-form">
          <div class="menu-field-group">
            <label class="fm-input__label fm-kicker" for="menu-room-id">ROOM ID</label>
            <div class="menu-join-row">
              <input
                id="menu-room-id"
                class="fm-input menu-input fm-input--error"
                type="text"
                value="9X4Z-77LL"
                placeholder="XXXX-XXXX"
                autocomplete="off"
                spellcheck="false"
                aria-invalid="true"
              />
              <button type="button" class="fm-btn fm-btn--secondary fm-btn--shake" data-action="join-room">
                <span class="fm-btn__label">Join</span>
              </button>
            </div>
          </div>
        </div>

        <div class="menu-card__divider" aria-hidden="true"></div>
      </section>
    </div>
  </main>

  <div class="frame-caption">// design/states/room-not-found.html · target: src/client/ui/MenuUI.ts</div>
</body>
</html>
